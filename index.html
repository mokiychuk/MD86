<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>MD86 | Football Card Pack Opener</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020408;
      --card-bg: #060a10;
      --common: #546e7a;
      --common-glow: rgba(84, 110, 122, 0.9);
      --rare: #ff8f00;
      --rare-glow: rgba(255, 143, 0, 0.9);
      --epic: #b44dff;
      --epic-glow: rgba(180, 77, 255, 0.9);
      --legendary: #ffd700;
      --legendary-glow: rgba(255, 215, 0, 1);
      --tots-bg: #0a1a2b;
      --tots-border: #1e4a6a;
      --tots-glow: rgba(0, 160, 255, 0.9);
      --accent: #00ff88;
      --accent2: #00e5ff;
      --danger: #ff3355;
      --bronze: #cd7f32;
      --silver: #c0c0c0;
      --gold: #ffd700;
      --panel-bg: #0a0f18;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: radial-gradient(ellipse at 20% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(180,77,255,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(0,229,255,0.04) 0%, transparent 50%);
      background-attachment: fixed;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #060a10; }
    ::-webkit-scrollbar-thumb { background: #1a3050; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .header {
      background: var(--panel-bg);
      border-bottom: 2px solid #1a2535;
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }
    .header .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,255,136,0.7);
      white-space: nowrap;
    }
    .header .logo span {
      color: var(--accent2);
      text-shadow: 0 0 20px rgba(0,229,255,0.7);
    }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .stat-item {
      background: #0d1520;
      border: 1px solid #1e2d3d;
      border-radius: 8px;
      padding: 8px 14px;
      text-align: center;
      min-width: 70px;
      clip-path: polygon(8% 0, 92% 0, 100% 20%, 100% 80%, 92% 100%, 8% 100%, 0% 80%, 0% 20%);
    }
    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: #7799bb;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }
    .stat-value {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,255,136,0.5);
    }
    .stat-value.coins { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.6); }

    .nav { display: flex; gap: 4px; padding: 12px 20px; justify-content: center; flex-wrap: wrap; }
    .nav-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 2px;
      padding: 10px 28px;
      border: 2px solid #1e2d3d;
      background: #0a0f18;
      color: #8899aa;
      cursor: pointer;
      clip-path: polygon(12% 0, 88% 0, 100% 25%, 100% 75%, 88% 100%, 12% 100%, 0% 75%, 0% 25%);
      transition: all 0.3s ease;
      text-transform: uppercase;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 20px rgba(0,255,136,0.4);
      text-shadow: 0 0 10px rgba(0,255,136,0.6);
    }
    .nav-btn.active {
      border-color: var(--accent);
      color: #000;
      background: var(--accent);
      box-shadow: 0 0 30px rgba(0,255,136,0.6);
      text-shadow: none;
    }

    .main-container { max-width: 1100px; margin: 0 auto; padding: 10px 16px 40px; }
    .section { display: none; }
    .section.active { display: block; animation: fadeInUp 0.4s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .packs-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px 0; }
    .pack-card {
      background: #060a10;
      border: 2px solid #1a2535;
      border-radius: 4px;
      padding: 24px 18px 20px;
      width: 280px;
      cursor: pointer;
      clip-path: polygon(8% 0, 92% 0, 100% 10%, 100% 90%, 92% 100%, 8% 100%, 0% 90%, 0% 10%);
      transition: all 0.35s ease;
      text-align: center;
    }
    .pack-card:hover { transform: translateY(-6px); }
    .pack-card.bronze { border-color: #5c3a1e; }
    .pack-card.bronze:hover { border-color: var(--bronze); box-shadow: 0 0 45px rgba(205,127,50,0.7), 0 20px 50px rgba(0,0,0,0.7); }
    .pack-card.silver { border-color: #4a5058; }
    .pack-card.silver:hover { border-color: var(--silver); box-shadow: 0 0 45px rgba(192,192,192,0.7), 0 20px 50px rgba(0,0,0,0.7); }
    .pack-card.gold { border-color: #5a4a10; }
    .pack-card.gold:hover { border-color: var(--gold); box-shadow: 0 0 55px rgba(255,215,0,0.8), 0 20px 50px rgba(0,0,0,0.7); }

    .pack-icon-circle {
      width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2rem;
      border: 3px solid; animation: pulseGlow 2.5s ease-in-out infinite;
    }
    .pack-card.bronze .pack-icon-circle { border-color: var(--bronze); color: var(--bronze); box-shadow: 0 0 25px rgba(205,127,50,0.6), inset 0 0 25px rgba(205,127,50,0.2); background: #1a0f05; }
    .pack-card.silver .pack-icon-circle { border-color: var(--silver); color: var(--silver); box-shadow: 0 0 25px rgba(192,192,192,0.6), inset 0 0 25px rgba(192,192,192,0.2); background: #111316; }
    .pack-card.gold .pack-icon-circle { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 30px rgba(255,215,0,0.7), inset 0 0 30px rgba(255,215,0,0.2); background: #1a1505; }
    @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 20px currentColor; } 50% { box-shadow: 0 0 45px currentColor, 0 0 80px currentColor; } }

    .pack-name { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 3px; font-size: 1rem; margin-bottom: 6px; text-transform: uppercase; }
    .pack-card.bronze .pack-name { color: #cd7f32; }
    .pack-card.silver .pack-name { color: #c0c0c0; }
    .pack-card.gold .pack-name { color: #ffd700; }
    .pack-price { font-family: 'Orbitron', monospace; font-size: 1.2rem; color: #ffd700; letter-spacing: 1px; }

    .cards-grid { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; padding: 10px 0; }
    .card-wrapper { position: relative; width: 150px; }
    .player-card {
      background: var(--card-bg);
      border: 2px solid #1e2d3d;
      border-radius: 4px;
      width: 100%; min-height: 210px;
      cursor: pointer;
      clip-path: polygon(10% 0, 90% 0, 100% 8%, 100% 92%, 90% 100%, 10% 100%, 0% 92%, 0% 8%);
      transition: transform 0.2s ease, box-shadow 0.2s;
      padding: 10px 8px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      position: relative;
    }
    .player-card:hover { transform: translateY(-4px); z-index: 5; }

    .player-card.rarity-common {
      border-color: #3a4d58;
      box-shadow: 0 0 22px var(--common-glow), 0 0 50px rgba(84,110,122,0.6);
      animation: commonGlow 3s ease-in-out infinite;
    }
    .player-card.rarity-common:hover { box-shadow: 0 0 40px var(--common-glow), 0 0 80px rgba(84,110,122,0.8); }
    .player-card.rarity-rare {
      border-color: #8a5c00;
      box-shadow: 0 0 28px var(--rare-glow), 0 0 60px rgba(255,143,0,0.6);
      animation: rareGlow 3s ease-in-out infinite;
    }
    .player-card.rarity-rare:hover { box-shadow: 0 0 48px var(--rare-glow), 0 0 90px rgba(255,143,0,0.8); }
    .player-card.rarity-epic {
      border-color: #6a1fb0;
      box-shadow: 0 0 32px var(--epic-glow), 0 0 70px rgba(180,77,255,0.7);
      animation: epicGlow 2.5s ease-in-out infinite;
    }
    .player-card.rarity-epic:hover { box-shadow: 0 0 55px var(--epic-glow), 0 0 110px rgba(180,77,255,0.9); }
    .player-card.rarity-legendary {
      border-color: #ffd700;
      box-shadow: 0 0 40px gold, 0 0 70px rgba(255,0,0,0.7), 0 0 100px rgba(0,0,255,0.7);
      animation: legendaryGlow 2s ease-in-out infinite;
    }
    .player-card.rarity-legendary:hover { box-shadow: 0 0 60px gold, 0 0 100px rgba(255,0,0,0.9), 0 0 140px rgba(0,0,255,0.9); }
    .player-card.rarity-tots {
      background: var(--tots-bg);
      border-color: var(--tots-border);
      box-shadow: 0 0 25px var(--tots-glow), 0 0 50px rgba(0,160,255,0.5);
      animation: totsGlow 2.5s ease-in-out infinite;
    }
    .player-card.rarity-tots:hover { box-shadow: 0 0 45px var(--tots-glow), 0 0 80px rgba(0,160,255,0.7); }

    @keyframes commonGlow { 0%,100% { box-shadow: 0 0 22px var(--common-glow), 0 0 50px rgba(84,110,122,0.6); } 50% { box-shadow: 0 0 38px var(--common-glow), 0 0 80px rgba(84,110,122,0.8); } }
    @keyframes rareGlow { 0%,100% { box-shadow: 0 0 28px var(--rare-glow), 0 0 60px rgba(255,143,0,0.6); } 50% { box-shadow: 0 0 45px var(--rare-glow), 0 0 90px rgba(255,143,0,0.8); } }
    @keyframes epicGlow { 0%,100% { box-shadow: 0 0 32px var(--epic-glow), 0 0 70px rgba(180,77,255,0.7); } 50% { box-shadow: 0 0 52px var(--epic-glow), 0 0 110px rgba(180,77,255,0.9); } }
    @keyframes legendaryGlow { 0%,100% { box-shadow: 0 0 40px gold, 0 0 70px red, 0 0 100px blue; } 50% { box-shadow: 0 0 60px gold, 0 0 100px red, 0 0 140px blue; } }
    @keyframes totsGlow { 0%,100% { box-shadow: 0 0 25px var(--tots-glow), 0 0 50px rgba(0,160,255,0.5); } 50% { box-shadow: 0 0 45px var(--tots-glow), 0 0 80px rgba(0,160,255,0.7); } }

    .card-rating { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.2rem; line-height: 1; letter-spacing: -1px; }
    .rarity-common .card-rating { color: #8a9ba8; text-shadow: 0 0 12px rgba(132,150,162,0.7); }
    .rarity-rare .card-rating { color: #ffb74d; text-shadow: 0 0 16px rgba(255,143,0,0.8); }
    .rarity-epic .card-rating { color: #d49fff; text-shadow: 0 0 20px rgba(180,77,255,0.9); }
    .rarity-legendary .card-rating { color: #ffd700; text-shadow: 0 0 20px gold, 0 0 40px red; }
    .rarity-tots .card-rating { color: #ffd700; text-shadow: 0 0 20px gold; }
    .card-pos { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 1.5px; background: #0d1520; padding: 3px 10px; clip-path: polygon(15% 0,85% 0,100% 30%,100% 70%,85% 100%,15% 100%,0% 70%,0% 30%); color: #aabbcc; }
    .card-flag { font-size: 2rem; line-height: 1; }
    .card-player-area { flex:1; display:flex; align-items:center; justify-content:center; width:100%; min-height:50px; background:#0a0f16; border-radius:2px; position:relative; overflow:hidden; }
    .card-player-area::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(255,255,255,0.01) 8px, rgba(255,255,255,0.01) 9px); pointer-events:none; }
    .card-name { font-family:'Orbitron', sans-serif; font-weight:700; font-size:0.7rem; letter-spacing:1px; text-align:center; text-transform:uppercase; color:#ddd; text-shadow:0 0 6px rgba(255,255,255,0.3); line-height:1.2; }
    .rarity-tots .card-name { color: #ffd700; }

    .duplicate-badge {
      position: absolute; top: -14px; right: -14px; background: #ff5500; color: #fff;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.7rem;
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      z-index: 20; box-shadow: 0 0 20px rgba(255,85,0,0.9);
    }
    .duplicate-label {
      position: absolute; top: -34px; left: 50%; transform: translateX(-50%); background: #ff3300; color: #fff;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.6rem; letter-spacing: 2px;
      padding: 5px 14px; clip-path: polygon(10% 0,90% 0,100% 30%,100% 70%,90% 100%,10% 100%,0% 70%,0% 30%);
      z-index: 20; white-space: nowrap; animation: blinkDup 1.2s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .duplicate-label.show { opacity: 1; }
    @keyframes blinkDup { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .player-card.locked { opacity:0.45; filter:grayscale(85%); cursor:default; pointer-events:none; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200;
      display:flex; align-items:center; justify-content:center; animation:fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal-card {
      background:var(--card-bg); border:3px solid #1e2d3d;
      clip-path: polygon(6% 0,94% 0,100% 5%,100% 95%,94% 100%,6% 100%,0% 95%,0% 5%);
      padding:30px 24px 20px; text-align:center; max-width:400px; width:90%; position:relative;
      animation:popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn { from{transform:scale(0.7); opacity:0;} to{transform:scale(1); opacity:1;} }
    .modal-card.rarity-common { border-color:#3a4d58; box-shadow:0 0 50px rgba(84,110,122,0.7); }
    .modal-card.rarity-rare { border-color:#8a5c00; box-shadow:0 0 55px rgba(255,143,0,0.8); }
    .modal-card.rarity-epic { border-color:#6a1fb0; box-shadow:0 0 60px rgba(180,77,255,0.9); }
    .modal-card.rarity-legendary { border-color:#ffd700; box-shadow:0 0 70px gold, 0 0 90px rgba(255,0,0,0.8), 0 0 120px rgba(0,0,255,0.8); }
    .modal-card.rarity-tots { border-color: var(--tots-border); box-shadow: 0 0 70px var(--tots-glow); }
    .modal-close { position:absolute; top:10px; right:16px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; z-index:10; font-family:'Orbitron',sans-serif; transition:color 0.2s; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
    .modal-close:hover { color:var(--danger); }
    .modal-rating { font-family:'Orbitron',sans-serif; font-weight:900; font-size:4rem; letter-spacing:-2px; line-height:1; }
    .modal-flag { font-size:3.5rem; }
    .modal-pos { font-family:'Orbitron',sans-serif; font-weight:700; font-size:1rem; letter-spacing:2px; background:#0d1520; display:inline-block; padding:5px 16px; clip-path:polygon(12% 0,88% 0,100% 25%,100% 75%,88% 100%,12% 100%,0% 75%,0% 25%); }
    .modal-name { font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.4rem; letter-spacing:2px; text-transform:uppercase; margin:8px 0; }
    .modal-sell-btn, .modal-close-btn {
      font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:2px; padding:12px 30px;
      border:2px solid; background:transparent; cursor:pointer;
      clip-path: polygon(10% 0,90% 0,100% 22%,100% 78%,90% 100%,10% 100%,0% 78%,0% 22%);
      transition:all 0.3s ease; font-size:0.9rem; margin:6px;
      min-width:44px; min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    }
    .modal-sell-btn { border-color: #ffd700; color: #ffd700; }
    .modal-sell-btn:hover { background:#ffd700; color:#000; box-shadow:0 0 30px rgba(255,215,0,0.7); }
    .modal-close-btn { border-color: #667788; color: #aabbcc; }
    .modal-close-btn:hover { border-color:#fff; color:#fff; box-shadow:0 0 15px rgba(255,255,255,0.4); }
    .modal-count { color:#ffaa00; font-family:'Orbitron',sans-serif; font-size:0.8rem; letter-spacing:1px; }

    .pack-opening-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:300;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
      perspective: 800px;
    }
    .pack-box {
      width:180px; height:220px; cursor:default;
      display:flex; align-items:center; justify-content:center;
      clip-path: polygon(6% 0,94% 0,100% 8%,100% 92%,94% 100%,6% 100%,0% 92%,0% 8%);
      font-family:'Orbitron',sans-serif; font-weight:900; font-size:3rem;
      transition: transform 0.1s;
    }
    .pack-box.shaking { animation: shake 0.6s ease-in-out infinite; }
    @keyframes shake {
      0%,100% { transform: translate(0,0) rotate(0); }
      20% { transform: translate(-8px,3px) rotate(-3deg); }
      40% { transform: translate(8px,-3px) rotate(3deg); }
      60% { transform: translate(-5px,-2px) rotate(-2deg); }
      80% { transform: translate(5px,2px) rotate(2deg); }
    }
    .pack-box.bronze-pack { background:#1a0f05; border:4px solid #cd7f32; color:#cd7f32; box-shadow:0 0 50px rgba(205,127,50,0.8); }
    .pack-box.silver-pack { background:#111316; border:4px solid #c0c0c0; color:#c0c0c0; box-shadow:0 0 50px rgba(192,192,192,0.8); }
    .pack-box.gold-pack { background:#1a1505; border:4px solid #ffd700; color:#ffd700; box-shadow:0 0 60px rgba(255,215,0,0.9); }
    .pack-opening-hint { color:#8899aa; font-family:'Inter',sans-serif; letter-spacing:2px; font-size:0.85rem; }

    .pack-reveal-cards {
      display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:900px; padding:10px;
      position:relative; width:100%; min-height:300px;
    }
    .pack-reveal-cards .card-wrapper {
      width:150px; height:210px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
      opacity:0;
    }
    .pack-reveal-cards .card-wrapper.moved { opacity:1; }
    .pack-reveal-cards .player-card {
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 4px;
      clip-path: polygon(10% 0, 90% 0, 100% 8%, 100% 92%, 90% 100%, 10% 100%, 0% 92%, 0% 8%);
    }
    .card-front {
      background: #0d1520;
      border: 2px solid #2a3a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      color: #1e2d3d;
      text-shadow: 0 0 10px rgba(255,255,255,0.1);
      background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, transparent 60%);
    }
    .card-back {
      transform: rotateY(180deg);
      background: var(--card-bg);
      border: 2px solid #1e2d3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 8px;
      gap: 4px;
    }

    .collect-btn {
      font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:2px; padding:14px 36px;
      border:2px solid var(--accent); background:transparent; color:var(--accent); cursor:pointer;
      clip-path: polygon(10% 0,90% 0,100% 22%,100% 78%,90% 100%,10% 100%,0% 78%,0% 22%);
      transition:all 0.3s ease; font-size:1rem; text-transform:uppercase;
      margin-top: 20px;
      min-width:44px; min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    }
    .collect-btn:hover { background:var(--accent); color:#000; box-shadow:0 0 35px rgba(0,255,136,0.7); }

    .particle {
      position:fixed; pointer-events:none; z-index:350; font-size:1.2rem;
      animation:particleFly 1s ease-out forwards;
      color:#fff;
    }
    @keyframes particleFly {
      0% { opacity:1; transform:translate(0,0) scale(1); }

    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(type, volumeScale = 1.0) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.7 * volumeScale;
        masterGain.connect(audioCtx.destination);

        if (type === 'shake') {
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(45, now);
            osc.frequency.linearRampToValueAtTime(35, now + 0.2);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.2, now);
            g.gain.linearRampToValueAtTime(0, now + 0.25);
            osc.connect(g); g.connect(masterGain);
            osc.start(now); osc.stop(now + 0.25);
        } else if (type === 'transform') {
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.15, now);
            g.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.connect(g); g.connect(masterGain);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'drop') {
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.08)); }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 200;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.4, now);
            noiseGain.gain.linearRampToValueAtTime(0, now + 0.35);
            noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(masterGain);
            noise.start(now); noise.stop(now + 0.35);
        } else if (type === 'hover') {
            const osc = audioCtx.createOscillator();
            osc.type = 'sine'; osc.frequency.value = 660;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.05, now);
            g.gain.linearRampToValueAtTime(0, now + 0.08);
            osc.connect(g); g.connect(masterGain);
            osc.start(now); osc.stop(now + 0.08);
        } else if (type === 'collectReady') {
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = freq;
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0.15, now + i * 0.12);
                g.gain.linearRampToValueAtTime(0, now + i * 0.12 + 0.2);
                osc.connect(g); g.connect(masterGain);
                osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.2);
            });
        } else if (type === 'flip') {
            const osc = audioCtx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.connect(g); g.connect(masterGain);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'legendary') {
            [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = freq;
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0.2, now + i * 0.1);
                g.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.3);
                osc.connect(g); g.connect(masterGain);
                osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
            });
        }
    }

    function buildCardHTML(player, count, isLocked = false) {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        const rarityClass = `rarity-${player.rarity}`;
        const lockedClass = isLocked ? ' locked' : '';
        const card = document.createElement('div');
        card.className = `player-card ${rarityClass}${lockedClass}`;
        card.setAttribute('data-player-id', player.id);
        if (!isLocked) {
            card.addEventListener('click', (e) => { e.stopPropagation(); openCardModal(player); });
            card.addEventListener('mouseenter', () => { initAudio(); playSound('hover', 0.3); });
        }
        card.innerHTML = `
            <div class="card-rating">${player.rating}</div>
            <div class="card-pos">${player.pos}</div>
            <div class="card-flag">${getFlagEmoji(player.country)}</div>
            <div class="card-player-area"></div>
            <div class="card-name">${player.name}</div>
        `;
        wrapper.appendChild(card);
        if (count > 1) {
            const badge = document.createElement('div');
            badge.className = 'duplicate-badge';
            badge.textContent = count;
            wrapper.appendChild(badge);
        }
        return wrapper;
    }

    let collectionMode = 'mycards';
    function renderCollection() {
        const grid = document.getElementById('collectionGrid');
        const emptyMsg = document.getElementById('collectionEmpty');
        const progress = document.getElementById('collectionProgress');
        if (!grid || !emptyMsg || !progress) return;
        const collectedUnique = getUniqueCardCount();
        const total = allPlayers.length;
        progress.textContent = `${collectedUnique} / ${total}`;

        grid.innerHTML = '';
        if (collectionMode === 'mycards') {
            const collectedIds = Object.keys(gameState.collection).filter(id => gameState.collection[id] > 0);
            if (collectedIds.length === 0) {
                emptyMsg.style.display = 'block';
                grid.style.display = 'none';
                return;
            }
            emptyMsg.style.display = 'none';
            grid.style.display = 'flex';
            const cards = collectedIds.map(id => getPlayerById(id)).filter(Boolean);
            cards.sort((a,b) => b.rating - a.rating);
            cards.forEach(p => grid.appendChild(buildCardHTML(p, gameState.collection[p.id], false)));
        } else {
            emptyMsg.style.display = 'none';
            grid.style.display = 'flex';
            [...allPlayers].sort((a,b) => b.rating - a.rating).forEach(p => {
                const count = gameState.collection[p.id] || 0;
                grid.appendChild(buildCardHTML(p, count, count === 0));
            });
        }
    }

    function sellCurrentCard() {
        if (!currentModalPlayer) return;
        const playerId = currentModalPlayer.id;
        const count = getCardCount(playerId);
        if (count <= 0) return;
        const price = getSellPrice(currentModalPlayer.rating);
        gameState.collection[playerId] = count - 1;

        gameState.balance += price;
        updateUI();
        renderCollection();
        closeModal();
    }

    let currentPackCards = [];
    function getPackOdds(type) {
        if (type === 'bronze') return { common:0.90, rare:0.09, epic:0.009, legendary:0.0005, tots:0.0005 };
        if (type === 'silver') return { common:0.75, rare:0.213, epic:0.035, legendary:0.001, tots:0.001 };
        return { common:0.60, rare:0.33, epic:0.065, legendary:0.003, tots:0.002 };
    }
    function getPackPrice(type) { return type==='bronze'?100: type==='silver'?250:500; }

    function generateUniquePack(packType) {
        const odds = getPackOdds(packType);
        const selected = [];
        const usedIds = new Set();
        for (let i=0; i<5; i++) {
            const roll = Math.random();
            let target;
            if (roll < odds.tots) target = 'tots';
            else if (roll < odds.tots + odds.legendary) target = 'legendary';
            else if (roll < odds.tots + odds.legendary + odds.epic) target = 'epic';
            else if (roll < odds.tots + odds.legendary + odds.epic + odds.rare) target = 'rare';
            else target = 'common';
            let pool = allPlayers.filter(p => p.rarity === target && !usedIds.has(p.id));
            if (pool.length === 0) pool = allPlayers.filter(p => !usedIds.has(p.id));
            const pick = pool[Math.floor(Math.random() * pool.length)];
            selected.push(pick);
            usedIds.add(pick.id);
        }
        selected.sort((a,b) => b.rating - a.rating);
        return selected;
    }

    function initiatePackOpen(packType) {
        initAudio();
        const price = getPackPrice(packType);
        if (gameState.balance < price) { alert('Недостаточно монет!'); return; }
        gameState.balance -= price;
        gameState.packsOpened++;
        updateUI();
        currentPackCards = generateUniquePack(packType);

        const overlay = document.getElementById('packOpeningOverlay');
        const packBox = document.getElementById('packBox');
        const hint = document.getElementById('packHint');
        const revealArea = document.getElementById('packRevealCards');
        const collectBtn = document.getElementById('collectBtn');

        overlay.style.display = 'flex';
        revealArea.innerHTML = '';
        collectBtn.style.display = 'none';
        hint.textContent = 'ОТКРЫВАЕМ...';
        packBox.className = 'pack-box ' + packType + '-pack';
        packBox.textContent = packType==='bronze'?'B': packType==='silver'?'S':'G';
        packBox.style.display = 'flex';
        packBox.classList.add('shaking');
        playSound('shake', 0.6);

        const isMobile = window.innerWidth < 768;

        setTimeout(() => {
            packBox.classList.remove('shaking');
            spawnParticles(packBox);
            playSound('transform', 0.5);
            packBox.style.display = 'none';
            hint.style.display = 'none';

            const cardWidth = isMobile ? Math.min(window.innerWidth * 0.8, 250) : 150;
            const gap = isMobile ? 15 : 20;
            const totalCount = currentPackCards.length;

            const positions = [];
            if (isMobile) {
                const totalHeight = totalCount * cardWidth * 0.7 + (totalCount - 1) * gap;
                const startY = -totalHeight / 2 + cardWidth * 0.35;
                for (let i = 0; i < totalCount; i++) {
                    positions.push({ x: 0, y: startY + i * (cardWidth * 0.7 + gap) });
                }
            } else {
                const totalWidth = totalCount * cardWidth + (totalCount - 1) * gap;
                const startX = -totalWidth / 2 + cardWidth / 2;
                for (let i = 0; i < totalCount; i++) {
                    positions.push({ x: startX + i * (cardWidth + gap), y: 0 });
                }
            }

            revealArea.style.position = 'relative';
            revealArea.style.width = '100%';
            revealArea.style.height = isMobile ? `${totalCount * (cardWidth * 0.7 + gap)}px` : '300px';

            currentPackCards.forEach((player, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.style.position = 'absolute';
                wrapper.style.left = '50%';
                wrapper.style.top = '50%';
                wrapper.style.transform = 'translate(-50%, -50%) scale(0)';
                wrapper.style.opacity = '0';
                wrapper.style.width = cardWidth + 'px';
                wrapper.style.height = (cardWidth * 1.4) + 'px';
                wrapper.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s';

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const front = document.createElement('div');
                front.className = 'card-front';
                front.textContent = 'MD86';

                const back = document.createElement('div');
                back.className = 'card-back player-card ' + ('rarity-' + player.rarity);
                back.innerHTML = `
                    <div class="card-rating">${player.rating}</div>
                    <div class="card-pos">${player.pos}</div>
                    <div class="card-flag">${getFlagEmoji(player.country)}</div>
                    <div class="card-player-area"></div>
                    <div class="card-name">${player.name}</div>
                `;

                inner.appendChild(front);
                inner.appendChild(back);
                wrapper.appendChild(inner);
                revealArea.appendChild(wrapper);

                wrapper._player = player;

                if (getCardCount(player.id) > 0) {
                    setTimeout(() => {
                        const dupLabel = document.createElement('div');
                        dupLabel.className = 'duplicate-label';
                        dupLabel.textContent = 'DUPLICATE';
                        wrapper.appendChild(dupLabel);
                        requestAnimationFrame(() => dupLabel.classList.add('show'));
                    }, 300);
                }

                const pos = positions[idx];
                setTimeout(() => {
                    wrapper.style.transform = `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px)) scale(1)`;
                    wrapper.style.opacity = '1';
                }, 50);
            });

            setTimeout(() => {
                const wrappers = revealArea.querySelectorAll('.card-wrapper');
                for (let i = wrappers.length - 1; i >= 0; i--) {
                    const delay = (wrappers.length - 1 - i) * 350;
                    setTimeout(() => {
                        const wrapper = wrappers[i];
                        wrapper.classList.add('flipped');
                        playSound('flip', 0.5);
                        const player = wrapper._player;
                        if (player.rarity === 'legendary') {
                            spawnLegendaryParticles(wrapper);
                            playSound('legendary', 0.8);
                        } else if (player.rarity === 'epic') {
                            spawnEpicParticles(wrapper);
                        } else if (player.rarity === 'tots') {
                            spawnTotsParticles(wrapper);
                        } else if (player.rarity === 'rare') {
                            const back = wrapper.querySelector('.card-back');
                            back.style.boxShadow = '0 0 40px gold, 0 0 80px gold';
                            setTimeout(() => { back.style.boxShadow = ''; }, 600);
                        }
                    }, delay);
                }

                const totalFlipTime = wrappers.length * 350 + 600;
                setTimeout(() => {
                    collectBtn.style.display = 'inline-flex';
                    playSound('collectReady', 0.5);
                }, totalFlipTime);
            }, 600);
        }, 1800);
    }

    function finishPack() {
        currentPackCards.forEach(p => {
            if (!gameState.collection[p.id]) gameState.collection[p.id] = 0;
            gameState.collection[p.id]++;
        });
        updateUI();
        renderCollection();
        closePackOpening();
    }

    function closePackOpening() {
        document.getElementById('packOpeningOverlay').style.display = 'none';
        document.getElementById('packBox').style.display = 'flex';
        document.getElementById('packRevealCards').innerHTML = '';
        document.getElementById('collectBtn').style.display = 'none';
        document.getElementById('packHint').style.display = 'block';
        currentPackCards = [];
    }

    function spawnParticles(sourceEl) {
        const count = window.innerWidth < 768 ? 15 : 30;
        const rect = sourceEl.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        for (let i=0; i<count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = ['#cd7f32','#c0c0c0','#ffd700'][Math.floor(Math.random()*3)];
            p.style.width = '8px';
            p.style.height = '8px';
            p.style.left = cx + 'px';
            p.style.top = cy + 'px';
            p.style.setProperty('--dx', (Math.random()-0.5)*400 + 'px');
            p.style.setProperty('--dy', (Math.random()-0.5)*400 + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    function spawnLegendaryParticles(wrapper) {
        const count = window.innerWidth < 768 ? 25 : 50;
        const rect = wrapper.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        for (let i=0; i<count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = 'gold';
            p.style.width = '6px'; p.style.height = '6px';
            p.style.left = cx + 'px'; p.style.top = cy + 'px';
            p.style.setProperty('--dx', (Math.random()-0.5)*300 + 'px');
            p.style.setProperty('--dy', (Math.random()-0.5)*300 + 'px');
            p.style.animationDuration = '1.5s';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1500);
        }
    }

    function spawnEpicParticles(wrapper) {
        const count = window.innerWidth < 768 ? 12 : 25;
        const rect = wrapper.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        for (let i=0; i<count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = '#b44dff';
            p.style.width = '6px'; p.style.height = '6px';
            p.style.left = cx + 'px'; p.style.top = cy + 'px';
            p.style.setProperty('--dx', (Math.random()-0.5)*250 + 'px');
            p.style.setProperty('--dy', (Math.random()-0.5)*250 + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    function spawnTotsParticles(wrapper) {
        const count = window.innerWidth < 768 ? 15 : 30;
        const rect = wrapper.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        for (let i=0; i<count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = '#00a0ff';
            p.style.width = '6px'; p.style.height = '6px';
            p.style.left = cx + 'px'; p.style.top = cy + 'px';
            p.style.setProperty('--dx', (Math.random()-0.5)*280 + 'px');
            p.style.setProperty('--dy', (Math.random()-0.5)*280 + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    function switchSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn[data-section]').forEach(b => b.classList.remove('active'));
        const sec = document.getElementById('section-' + name);
        if (sec) sec.classList.add('active');
        const btn = document.querySelector(`.nav-btn[data-section="${name}"]`);
        if (btn) btn.classList.add('active');
        if (name === 'collection') renderCollection();
        if (name === 'shop') renderShop();
    }

    // Event listeners
    document.querySelectorAll('.nav-btn[data-section]').forEach(btn => btn.addEventListener('click', () => switchSection(btn.dataset.section)));
    document.getElementById('btnMyCards').addEventListener('click', () => setCollectionMode('mycards'));
    document.getElementById('btnAlbum').addEventListener('click', () => setCollectionMode('album'));
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalCloseBtn2').addEventListener('click', closeModal);
    document.getElementById('modalSellBtn').addEventListener('click', sellCurrentCard);
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape' && document.getElementById('modalOverlay').style.display==='flex') closeModal(); });
    document.getElementById('collectBtn').addEventListener('click', finishPack);
    document.getElementById('resetBtn').addEventListener('click', function() {
        if (confirm('Сбросить весь прогресс? Это действие необратимо.')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    });

    // Hover sounds
    document.querySelectorAll('.nav-btn, .pack-card, .modal-sell-btn, .modal-close-btn, .collect-btn').forEach(el => {
        el.addEventListener('mouseenter', () => { initAudio(); playSound('hover', 0.3); });
    });

    // Init
    loadState();
    updateUI();
    renderShop();
    renderCollection();
    setCollectionMode('mycards');
    switchSection('shop');
});
</script>
</body>
</html>
