<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>MD86 | Football Card Pack Opener</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020408;
      --card-bg: #060a10;
      --common: #546e7a;
      --common-glow: rgba(84, 110, 122, 0.9);
      --rare: #ff8f00;
      --rare-glow: rgba(255, 143, 0, 0.9);
      --epic: #b44dff;
      --epic-glow: rgba(180, 77, 255, 0.9);
      --legendary: #ffd700;
      --legendary-glow: rgba(255, 215, 0, 1);
      --tots-bg: #0a1a2b;
      --tots-border: #1e4a6a;
      --tots-glow: rgba(0, 160, 255, 0.9);
      --accent: #00ff88;
      --accent2: #00e5ff;
      --danger: #ff3355;
      --bronze: #cd7f32;
      --silver: #c0c0c0;
      --gold: #ffd700;
      --panel-bg: #0a0f18;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: radial-gradient(ellipse at 20% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(180,77,255,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(0,229,255,0.04) 0%, transparent 50%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #060a10; }
    ::-webkit-scrollbar-thumb { background: #1a3050; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .header {
      background: var(--panel-bg);
      border-bottom: 2px solid #1a2535;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }
    .header .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,255,136,0.7);
      white-space: nowrap;
    }
    .header .logo span {
      color: var(--accent2);
      text-shadow: 0 0 20px rgba(0,229,255,0.7);
    }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .stat-item {
      background: #0d1520;
      border: 1px solid #1e2d3d;
      border-radius: 6px;
      padding: 6px 10px;
      text-align: center;
      min-width: 60px;
      clip-path: polygon(8% 0, 92% 0, 100% 20%, 100% 80%, 92% 100%, 8% 100%, 0% 80%, 0% 20%);
    }
    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 1px;
      color: #7799bb;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }
    .stat-value {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,255,136,0.5);
    }
    .stat-value.coins { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.6); }

    .nav { display: flex; gap: 4px; padding: 8px 20px; justify-content: center; flex-shrink: 0; background: var(--panel-bg); border-bottom: 1px solid #1a2535; }
    .nav-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      padding: 8px 20px;
      border: 2px solid #1e2d3d;
      background: #0a0f18;
      color: #8899aa;
      cursor: pointer;
      clip-path: polygon(12% 0, 88% 0, 100% 25%, 100% 75%, 88% 100%, 12% 100%, 0% 75%, 0% 25%);
      transition: all 0.3s ease;
      text-transform: uppercase;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 15px rgba(0,255,136,0.4);
      text-shadow: 0 0 8px rgba(0,255,136,0.6);
    }
    .nav-btn.active {
      border-color: var(--accent);
      color: #000;
      background: var(--accent);
      box-shadow: 0 0 20px rgba(0,255,136,0.6);
      text-shadow: none;
    }

    .main-container { flex: 1; overflow-y: auto; padding: 10px 16px 20px; }
    .section { display: none; }
    .section.active { display: flex; flex-direction: column; height: 100%; animation: fadeInUp 0.4s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Shop section – без скролла, все элементы умещаются */
    .section-shop { justify-content: center; align-items: center; }
    .packs-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; align-items: center; padding: 10px 0; }
    .pack-card {
      background: #060a10;
      border: 2px solid #1a2535;
      border-radius: 4px;
      padding: 18px 12px 14px;
      width: 220px;
      cursor: pointer;
      clip-path: polygon(8% 0, 92% 0, 100% 10%, 100% 90%, 92% 100%, 8% 100%, 0% 90%, 0% 10%);
      transition: all 0.35s ease;
      text-align: center;
      flex-shrink: 0;
    }
    .pack-card:hover { transform: translateY(-4px); }
    .pack-card.bronze { border-color: #5c3a1e; }
    .pack-card.bronze:hover { border-color: var(--bronze); box-shadow: 0 0 30px rgba(205,127,50,0.6), 0 15px 30px rgba(0,0,0,0.5); }
    .pack-card.silver { border-color: #4a5058; }
    .pack-card.silver:hover { border-color: var(--silver); box-shadow: 0 0 30px rgba(192,192,192,0.6), 0 15px 30px rgba(0,0,0,0.5); }
    .pack-card.gold { border-color: #5a4a10; }
    .pack-card.gold:hover { border-color: var(--gold); box-shadow: 0 0 35px rgba(255,215,0,0.7), 0 15px 30px rgba(0,0,0,0.5); }

    .pack-icon-circle {
      width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.6rem;
      border: 3px solid; animation: pulseGlow 2.5s ease-in-out infinite;
    }
    .pack-card.bronze .pack-icon-circle { border-color: var(--bronze); color: var(--bronze); box-shadow: 0 0 20px rgba(205,127,50,0.5), inset 0 0 15px rgba(205,127,50,0.2); background: #1a0f05; }
    .pack-card.silver .pack-icon-circle { border-color: var(--silver); color: var(--silver); box-shadow: 0 0 20px rgba(192,192,192,0.5), inset 0 0 15px rgba(192,192,192,0.2); background: #111316; }
    .pack-card.gold .pack-icon-circle { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 25px rgba(255,215,0,0.6), inset 0 0 20px rgba(255,215,0,0.2); background: #1a1505; }
    @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 15px currentColor; } 50% { box-shadow: 0 0 35px currentColor, 0 0 60px currentColor; } }

    .pack-name { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 0.85rem; margin-bottom: 4px; text-transform: uppercase; }
    .pack-card.bronze .pack-name { color: #cd7f32; }
    .pack-card.silver .pack-name { color: #c0c0c0; }
    .pack-card.gold .pack-name { color: #ffd700; }
    .pack-price { font-family: 'Orbitron', monospace; font-size: 1rem; color: #ffd700; letter-spacing: 1px; }

    /* Collection section – разрешён скролл */
    .section-collection { overflow-y: auto; }
    .cards-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 10px 0; }
    .card-wrapper { position: relative; width: 140px; }
    .player-card {
      background: var(--card-bg);
      border: 2px solid #1e2d3d;
      border-radius: 4px;
      width: 100%; min-height: 190px;
      cursor: pointer;
      clip-path: polygon(10% 0, 90% 0, 100% 8%, 100% 92%, 90% 100%, 10% 100%, 0% 92%, 0% 8%);
      transition: transform 0.2s ease, box-shadow 0.2s;
      padding: 8px 6px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      position: relative;
    }
    .player-card:hover { transform: translateY(-3px); z-index: 5; }

    .player-card.rarity-common {
      border-color: #3a4d58;
      box-shadow: 0 0 18px var(--common-glow), 0 0 35px rgba(84,110,122,0.5);
      animation: commonGlow 3s ease-in-out infinite;
    }
    .player-card.rarity-common:hover { box-shadow: 0 0 30px var(--common-glow), 0 0 60px rgba(84,110,122,0.7); }
    .player-card.rarity-rare {
      border-color: #8a5c00;
      box-shadow: 0 0 22px var(--rare-glow), 0 0 45px rgba(255,143,0,0.5);
      animation: rareGlow 3s ease-in-out infinite;
    }
    .player-card.rarity-rare:hover { box-shadow: 0 0 35px var(--rare-glow), 0 0 70px rgba(255,143,0,0.7); }
    .player-card.rarity-epic {
      border-color: #6a1fb0;
      box-shadow: 0 0 26px var(--epic-glow), 0 0 55px rgba(180,77,255,0.6);
      animation: epicGlow 2.5s ease-in-out infinite;
    }
    .player-card.rarity-epic:hover { box-shadow: 0 0 40px var(--epic-glow), 0 0 85px rgba(180,77,255,0.8); }
    .player-card.rarity-legendary {
      border-color: #ffd700;
      box-shadow: 0 0 32px gold, 0 0 55px rgba(255,0,0,0.6), 0 0 80px rgba(0,0,255,0.6);
      animation: legendaryGlow 2s ease-in-out infinite;
    }
    .player-card.rarity-legendary:hover { box-shadow: 0 0 48px gold, 0 0 80px rgba(255,0,0,0.8), 0 0 110px rgba(0,0,255,0.8); }
    .player-card.rarity-tots {
      background: var(--tots-bg);
      border-color: var(--tots-border);
      box-shadow: 0 0 20px var(--tots-glow), 0 0 40px rgba(0,160,255,0.4);
      animation: totsGlow 2.5s ease-in-out infinite;
    }
    .player-card.rarity-tots:hover { box-shadow: 0 0 35px var(--tots-glow), 0 0 65px rgba(0,160,255,0.6); }

    @keyframes commonGlow { 0%,100% { box-shadow: 0 0 18px var(--common-glow), 0 0 35px rgba(84,110,122,0.5); } 50% { box-shadow: 0 0 30px var(--common-glow), 0 0 60px rgba(84,110,122,0.7); } }
    @keyframes rareGlow { 0%,100% { box-shadow: 0 0 22px var(--rare-glow), 0 0 45px rgba(255,143,0,0.5); } 50% { box-shadow: 0 0 35px var(--rare-glow), 0 0 70px rgba(255,143,0,0.7); } }
    @keyframes epicGlow { 0%,100% { box-shadow: 0 0 26px var(--epic-glow), 0 0 55px rgba(180,77,255,0.6); } 50% { box-shadow: 0 0 40px var(--epic-glow), 0 0 85px rgba(180,77,255,0.8); } }
    @keyframes legendaryGlow { 0%,100% { box-shadow: 0 0 32px gold, 0 0 55px red, 0 0 80px blue; } 50% { box-shadow: 0 0 48px gold, 0 0 80px red, 0 0 110px blue; } }
    @keyframes totsGlow { 0%,100% { box-shadow: 0 0 20px var(--tots-glow), 0 0 40px rgba(0,160,255,0.4); } 50% { box-shadow: 0 0 35px var(--tots-glow), 0 0 65px rgba(0,160,255,0.6); } }

    .card-rating { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.8rem; line-height: 1; letter-spacing: -1px; }
    .rarity-common .card-rating { color: #8a9ba8; text-shadow: 0 0 10px rgba(132,150,162,0.6); }
    .rarity-rare .card-rating { color: #ffb74d; text-shadow: 0 0 12px rgba(255,143,0,0.7); }
    .rarity-epic .card-rating { color: #d49fff; text-shadow: 0 0 16px rgba(180,77,255,0.8); }
    .rarity-legendary .card-rating { color: #ffd700; text-shadow: 0 0 16px gold, 0 0 32px red; }
    .rarity-tots .card-rating { color: #ffd700; text-shadow: 0 0 16px gold; }
    .card-pos { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.65rem; letter-spacing: 1.2px; background: #0d1520; padding: 2px 8px; clip-path: polygon(15% 0,85% 0,100% 30%,100% 70%,85% 100%,15% 100%,0% 70%,0% 30%); color: #aabbcc; }
    .card-flag { font-size: 1.6rem; line-height: 1; }
    .card-player-area { flex:1; display:flex; align-items:center; justify-content:center; width:100%; min-height:40px; background:#0a0f16; border-radius:2px; position:relative; overflow:hidden; }
    .card-player-area::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(255,255,255,0.01) 6px, rgba(255,255,255,0.01) 7px); pointer-events:none; }
    .card-name { font-family:'Orbitron', sans-serif; font-weight:700; font-size:0.6rem; letter-spacing:0.8px; text-align:center; text-transform:uppercase; color:#ddd; text-shadow:0 0 4px rgba(255,255,255,0.2); line-height:1.2; }
    .rarity-tots .card-name { color: #ffd700; }

    .duplicate-badge {
      position: absolute; top: -10px; right: -10px; background: #ff5500; color: #fff;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.6rem;
      width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      z-index: 20; box-shadow: 0 0 15px rgba(255,85,0,0.8);
    }
    .duplicate-label {
      position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: #ff3300; color: #fff;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.55rem; letter-spacing: 1.5px;
      padding: 4px 10px; clip-path: polygon(10% 0,90% 0,100% 30%,100% 70%,90% 100%,10% 100%,0% 70%,0% 30%);
      z-index: 20; white-space: nowrap; animation: blinkDup 1.2s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .duplicate-label.show { opacity: 1; }
    @keyframes blinkDup { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .player-card.locked { opacity:0.45; filter:grayscale(85%); cursor:default; pointer-events:none; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200;
      display:flex; align-items:center; justify-content:center; animation:fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal-card {
      background:var(--card-bg); border:3px solid #1e2d3d;
      clip-path: polygon(6% 0,94% 0,100% 5%,100% 95%,94% 100%,6% 100%,0% 95%,0% 5%);
      padding:20px 16px 15px; text-align:center; max-width:360px; width:90%; position:relative;
      animation:popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes popIn { from{transform:scale(0.7); opacity:0;} to{transform:scale(1); opacity:1;} }
    .modal-card.rarity-common { border-color:#3a4d58; box-shadow:0 0 40px rgba(84,110,122,0.6); }
    .modal-card.rarity-rare { border-color:#8a5c00; box-shadow:0 0 45px rgba(255,143,0,0.7); }
    .modal-card.rarity-epic { border-color:#6a1fb0; box-shadow:0 0 50px rgba(180,77,255,0.8); }
    .modal-card.rarity-legendary { border-color:#ffd700; box-shadow:0 0 60px gold, 0 0 75px rgba(255,0,0,0.7), 0 0 100px rgba(0,0,255,0.7); }
    .modal-card.rarity-tots { border-color: var(--tots-border); box-shadow: 0 0 60px var(--tots-glow); }
    .modal-close { position:absolute; top:8px; right:12px; background:none; border:none; color:#fff; font-size:1.3rem; cursor:pointer; z-index:10; font-family:'Orbitron',sans-serif; transition:color 0.2s; min-width:40px; min-height:40px; display:flex; align-items:center; justify-content:center; }
    .modal-close:hover { color:var(--danger); }
    .modal-rating { font-family:'Orbitron',sans-serif; font-weight:900; font-size:3rem; letter-spacing:-1px; line-height:1; }
    .modal-flag { font-size:2.8rem; }
    .modal-pos { font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.85rem; letter-spacing:1.5px; background:#0d1520; display:inline-block; padding:4px 12px; clip-path:polygon(12% 0,88% 0,100% 25%,100% 75%,88% 100%,12% 100%,0% 75%,0% 25%); }
    .modal-name { font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.2rem; letter-spacing:1.5px; text-transform:uppercase; margin:6px 0; }
    .modal-sell-btn, .modal-close-btn {
      font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:1.5px; padding:10px 24px;
      border:2px solid; background:transparent; cursor:pointer;
      clip-path: polygon(10% 0,90% 0,100% 22%,100% 78%,90% 100%,10% 100%,0% 78%,0% 22%);
      transition:all 0.3s ease; font-size:0.8rem; margin:5px;
      min-width:44px; min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    }
    .modal-sell-btn { border-color: #ffd700; color: #ffd700; }
    .modal-sell-btn:hover { background:#ffd700; color:#000; box-shadow:0 0 25px rgba(255,215,0,0.6); }
    .modal-close-btn { border-color: #667788; color: #aabbcc; }
    .modal-close-btn:hover { border-color:#fff; color:#fff; box-shadow:0 0 15px rgba(255,255,255,0.3); }
    .modal-count { color:#ffaa00; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:1px; }

    /* Pack opening overlay – без скролла экрана, внутренний скролл для карточек */
    .pack-opening-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:300;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
      perspective: 800px;
      padding: 10px;
    }
    .pack-box {
      width:140px; height:170px; cursor:default;
      display:flex; align-items:center; justify-content:center;
      clip-path: polygon(6% 0,94% 0,100% 8%,100% 92%,94% 100%,6% 100%,0% 92%,0% 8%);
      font-family:'Orbitron',sans-serif; font-weight:900; font-size:2.5rem;
      transition: transform 0.1s;
    }
    .pack-box.shaking { animation: shake 0.6s ease-in-out infinite; }
    @keyframes shake {
      0%,100% { transform: translate(0,0) rotate(0); }
      20% { transform: translate(-6px,2px) rotate(-2deg); }
      40% { transform: translate(6px,-2px) rotate(2deg); }
      60% { transform: translate(-4px,-1px) rotate(-1deg); }
      80% { transform: translate(4px,1px) rotate(1deg); }
    }
    .pack-box.bronze-pack { background:#1a0f05; border:3px solid #cd7f32; color:#cd7f32; box-shadow:0 0 40px rgba(205,127,50,0.7); }
    .pack-box.silver-pack { background:#111316; border:3px solid #c0c0c0; color:#c0c0c0; box-shadow:0 0 40px rgba(192,192,192,0.7); }
    .pack-box.gold-pack { background:#1a1505; border:3px solid #ffd700; color:#ffd700; box-shadow:0 0 50px rgba(255,215,0,0.8); }
    .pack-opening-hint { color:#8899aa; font-family:'Inter',sans-serif; letter-spacing:1.5px; font-size:0.8rem; }

    .pack-reveal-cards {
      display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-items:center;
      width:100%; max-height:55vh; overflow-y:auto; padding:5px;
    }
    .pack-reveal-cards .card-wrapper {
      width:120px; height:168px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
      opacity:0;
    }
    .pack-reveal-cards .card-wrapper.moved { opacity:1; }
    .pack-reveal-cards .player-card {
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 4px;
      clip-path: polygon(10% 0, 90% 0, 100% 8%, 100% 92%, 90% 100%, 10% 100%, 0% 92%, 0% 8%);
    }
    .card-front {
      background: #0d1520;
      border: 2px solid #2a3a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: #1e2d3d;
      text-shadow: 0 0 8px rgba(255,255,255,0.1);
      background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, transparent 60%);
    }
    .card-back {
      transform: rotateY(180deg);
      background: var(--card-bg);
      border: 2px solid #1e2d3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 6px;
      gap: 3px;
    }

    .collect-btn {
      font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:1.5px; padding:10px 28px;
      border:2px solid var(--accent); background:transparent; color:var(--accent); cursor:pointer;
      clip-path: polygon(10% 0,90% 0,100% 22%,100% 78%,90% 100%,10% 100%,0% 78%,0% 22%);
      transition:all 0.3s ease; font-size:0.9rem; text-transform:uppercase;
      min-width:44px; min-height:44px; display:inline-flex; align-items:center; justify-content:center;
      flex-shrink: 0;
    }
    .collect-btn:hover { background:var(--accent); color:#000; box-shadow:0 0 25px rgba(0,255,136,0.6); }

    .particle {
      position:fixed; pointer-events:none; z-index:350; font-size:1rem;
      animation:particleFly 0.9s ease-out forwards;
      color:#fff;
    }
    @keyframes particleFly {
      0% { opacity:1; transform:translate(0,0) scale(1); }
      100% { opacity:0; transform:translate(var(--dx), var(--dy)) scale(0.2); }
    }

    .empty-state { text-align:center; padding:30px; color:#556677; font-family:'Inter',sans-serif; letter-spacing:1px; }
    .progress-stats {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      color: var(--accent2);
      font-size: 0.8rem;
      margin-bottom: 6px;
      text-shadow: 0 0 10px rgba(0,229,255,0.3);
    }
    .collection-filters {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin: 4px 0;
      flex-wrap: wrap;
    }

    /* Адаптивные правки для мобильных */
    @media (max-width: 767px) {
      .header {
        padding: 8px 12px;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .logo { font-size: 1.1rem; }
      .stats { gap: 6px; }
      .stat-item { padding: 4px 8px; min-width: auto; }
      .stat-value { font-size: 0.8rem; }
      .stat-label { font-size: 0.5rem; }

      .nav { padding: 6px 10px; }
      .nav-btn { padding: 8px 16px; font-size: 0.75rem; }

      .packs-grid { gap: 10px; padding: 5px 0; }
      .pack-card { width: 28vw; min-width: 100px; padding: 12px 8px; }
      .pack-icon-circle { width: 50px; height: 50px; font-size: 1.3rem; }
      .pack-name { font-size: 0.7rem; }
      .pack-price { font-size: 0.8rem; }

      .cards-grid .card-wrapper { width: 44%; max-width: 150px; }
      .player-card { min-height: 170px; }
      .card-rating { font-size: 1.6rem; }
      .card-flag { font-size: 1.4rem; }

      .pack-reveal-cards .card-wrapper { width: 100px; height: 140px; }
      .pack-box { width: 120px; height: 150px; font-size: 2rem; }
      .collect-btn { padding: 8px 20px; font-size: 0.8rem; }

      .modal-card { max-width: 320px; padding: 15px; }
      .modal-rating { font-size: 2.5rem; }
      .modal-flag { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
<header class="header">
  <div class="logo">MD<span>86</span></div>
  <div class="stats">
    <div class="stat-item"><div class="stat-label">Баланс</div><div class="stat-value coins" id="balance">1 000 000</div></div>
    <div class="stat-item"><div class="stat-label">Паков</div><div class="stat-value" id="packsOpened">0</div></div>
    <div class="stat-item"><div class="stat-label">Уник. карт</div><div class="stat-value" id="uniqueCards">0</div></div>
    <button id="resetBtn" style="background:#ff3355; color:#fff; border:none; padding:4px 10px; font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:1px; clip-path:polygon(10% 0,90% 0,100% 25%,100% 75%,90% 100%,10% 100%,0% 75%,0% 25%); cursor:pointer; min-width:44px; min-height:44px; font-size:0.7rem;">RESET</button>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn active" data-section="shop">SHOP</button>
  <button class="nav-btn" data-section="collection">COLLECTION</button>
</nav>

<div class="main-container">
  <div class="section active" id="section-shop">
    <div class="packs-grid" id="packsGrid"></div>
  </div>
  <div class="section" id="section-collection">
    <div class="progress-stats" id="collectionProgress"></div>
    <div class="collection-filters">
      <button class="nav-btn active" id="btnMyCards">MY CARDS</button>
      <button class="nav-btn" id="btnAlbum">ALBUM</button>
    </div>
    <div class="cards-grid" id="collectionGrid"></div>
    <div class="empty-state" id="collectionEmpty">Нет собранных карточек. Откройте паки в магазине!</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div class="modal-rating" id="modalRating"></div>
    <div class="modal-pos" id="modalPos"></div>
    <div class="modal-flag" id="modalFlag"></div>
    <div class="card-player-area" style="min-height:30px;background:transparent;"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-count" id="modalCount"></div>
    <button class="modal-sell-btn" id="modalSellBtn">SELL</button>
    <button class="modal-close-btn" id="modalCloseBtn2">CLOSE</button>
  </div>
</div>

<div class="pack-opening-overlay" id="packOpeningOverlay" style="display:none;">
  <div class="pack-opening-hint" id="packHint">ОТКРЫВАЕМ...</div>
  <div class="pack-box" id="packBox"></div>
  <div class="pack-reveal-cards" id="packRevealCards"></div>
  <button class="collect-btn" id="collectBtn" style="display:none;">COLLECT CARDS</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const allPlayers = [
        { id:'p1', name:'MBAPPÉ', rating:96, pos:'ST', country:'FR', rarity:'tots' },
        { id:'p2', name:'BELLINGHAM', rating:95, pos:'CM', country:'EN', rarity:'tots' },
        { id:'p3', name:'HAALAND', rating:95, pos:'ST', country:'NO', rarity:'tots' },
        { id:'p4', name:'VINI JR', rating:95, pos:'LW', country:'BR', rarity:'tots' },
        { id:'p5', name:'RODRI', rating:95, pos:'CDM', country:'ES', rarity:'tots' },
        { id:'p6', name:'LAMINE YAMAL', rating:95, pos:'RW', country:'ES', rarity:'tots' },
        { id:'p7', name:'SALAH', rating:95, pos:'RM', country:'EG', rarity:'tots' },
        { id:'p8', name:'VALVERDE', rating:94, pos:'CM', country:'UY', rarity:'tots' },
        { id:'p9', name:'MUSIALA', rating:94, pos:'CAM', country:'DE', rarity:'tots' },
        { id:'p10', name:'DE BRUYNE', rating:94, pos:'CM', country:'BE', rarity:'tots' },
        { id:'p11', name:'WIRTZ', rating:94, pos:'CAM', country:'DE', rarity:'tots' },
        { id:'p12', name:'KANE', rating:94, pos:'ST', country:'EN', rarity:'tots' },
        { id:'p13', name:'VAN DIJK', rating:94, pos:'CB', country:'NL', rarity:'tots' },
        { id:'p14', name:'COURTOIS', rating:94, pos:'GK', country:'BE', rarity:'tots' },
        { id:'p15', name:'TER STEGEN', rating:94, pos:'GK', country:'DE', rarity:'tots' },
        { id:'p16', name:'ALISSON', rating:94, pos:'GK', country:'BR', rarity:'tots' },
        { id:'p17', name:'RAPHINHA', rating:94, pos:'RW', country:'BR', rarity:'tots' },
        { id:'p18', name:'SALIBA', rating:94, pos:'CB', country:'FR', rarity:'tots' },
        { id:'p19', name:'VITINHA', rating:94, pos:'CM', country:'PT', rarity:'tots' },
        { id:'p20', name:'RÚBEN DIAS', rating:94, pos:'CB', country:'PT', rarity:'tots' },
        { id:'e1', name:'MBAPPÉ', rating:92, pos:'ST', country:'FR', rarity:'epic' },
        { id:'e2', name:'BELLINGHAM', rating:91, pos:'CM', country:'EN', rarity:'epic' },
        { id:'e3', name:'HAALAND', rating:91, pos:'ST', country:'NO', rarity:'epic' },
        { id:'e4', name:'VINI JR', rating:91, pos:'LW', country:'BR', rarity:'epic' },
        { id:'e5', name:'RODRI', rating:91, pos:'CDM', country:'ES', rarity:'epic' },
        { id:'e6', name:'LAMINE YAMAL', rating:91, pos:'RW', country:'ES', rarity:'epic' },
        { id:'e7', name:'SALAH', rating:91, pos:'RM', country:'EG', rarity:'epic' },
        { id:'e8', name:'VALVERDE', rating:90, pos:'CM', country:'UY', rarity:'epic' },
        { id:'e9', name:'MUSIALA', rating:90, pos:'CAM', country:'DE', rarity:'epic' },
        { id:'e10', name:'DE BRUYNE', rating:90, pos:'CM', country:'BE', rarity:'epic' },
        { id:'e11', name:'WIRTZ', rating:90, pos:'CAM', country:'DE', rarity:'epic' },
        { id:'e12', name:'KANE', rating:90, pos:'ST', country:'EN', rarity:'epic' },
        { id:'e13', name:'VAN DIJK', rating:89, pos:'CB', country:'NL', rarity:'epic' },
        { id:'e14', name:'COURTOIS', rating:89, pos:'GK', country:'BE', rarity:'epic' },
        { id:'e15', name:'TER STEGEN', rating:89, pos:'GK', country:'DE', rarity:'epic' },
        { id:'e16', name:'ALISSON', rating:89, pos:'GK', country:'BR', rarity:'epic' },
        { id:'e17', name:'RAPHINHA', rating:89, pos:'RW', country:'BR', rarity:'epic' },
        { id:'e18', name:'SALIBA', rating:89, pos:'CB', country:'FR', rarity:'epic' },
        { id:'e19', name:'VITINHA', rating:89, pos:'CM', country:'PT', rarity:'epic' },
        { id:'e20', name:'RÚBEN DIAS', rating:89, pos:'CB', country:'PT', rarity:'epic' },
        // ... (остальные игроки без изменений, сокращены для читаемости)
        { id:'p200', name:'MOKIYCHUK', rating:99, pos:'CB', country:'RU', rarity:'legendary' },
        { id:'p201', name:'KOROBOV', rating:99, pos:'GK', country:'RU', rarity:'legendary' }
    ];

    function getFlagEmoji(countryCode) {
        if (countryCode === 'EN') return '🏴󠁧󠁢󠁥󠁮󠁧󠁿';
        const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
        return String.fromCodePoint(...codePoints);
    }

    const STORAGE_KEY = 'md86_save';
    let gameState = { balance: 1000000, collection: {}, packsOpened: 0 };

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }
    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                gameState.balance = parsed.balance ?? 1000000;
                gameState.collection = parsed.collection ?? {};
                gameState.packsOpened = parsed.packsOpened ?? 0;
            } catch (e) { resetState(); }
        }
    }
    function resetState() { gameState.balance = 1000000; gameState.collection = {}; gameState.packsOpened = 0; saveState(); }
    function getPlayerById(id) { return allPlayers.find(p => p.id === id); }
    function getCardCount(playerId) { return gameState.collection[playerId] || 0; }
    function getSellPrice(rating) {
        if (rating === 99) return 2000;
        if (rating >= 90) return 800;
        if (rating >= 85) return 500;
        if (rating >= 80) return 300;
        if (rating >= 75) return 200;
        if (rating >= 70) return 100;
        return 50;
    }
    function getUniqueCardCount() { return Object.keys(gameState.collection).filter(id => gameState.collection[id] > 0).length; }
    function updateUI() {
        document.getElementById('balance').textContent = gameState.balance.toLocaleString('ru-RU');
        document.getElementById('packsOpened').textContent = gameState.packsOpened;
        document.getElementById('uniqueCards').textContent = getUniqueCardCount();
        saveState();
    }

    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(type, volumeScale = 1.0) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.6 * volumeScale;
        masterGain.connect(audioCtx.destination);
        if (type === 'shake') {
            const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(45, now); osc.frequency.linearRampToValueAtTime(35, now + 0.2);
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now + 0.25);
            osc.connect(g); g.connect(masterGain); osc.start(now); osc.stop(now + 0.25);
        } else if (type === 'transform') {
            const osc = audioCtx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.connect(g); g.connect(masterGain); osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'drop') {
            const bufferSize = audioCtx.sampleRate * 0.3; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.08));
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 200;
            const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.3, now); noiseGain.gain.linearRampToValueAtTime(0, now + 0.35);
            noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(masterGain); noise.start(now); noise.stop(now + 0.35);
        } else if (type === 'hover') {
            const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 660;
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.04, now); g.gain.linearRampToValueAtTime(0, now + 0.06);
            osc.connect(g); g.connect(masterGain); osc.start(now); osc.stop(now + 0.06);
        } else if (type === 'collectReady') {
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
                const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, now + i * 0.1); g.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.15);
                osc.connect(g); g.connect(masterGain); osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.15);
            });
        } else if (type === 'flip') {
            const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(400, now + 0.12);
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.08, now); g.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.connect(g); g.connect(masterGain); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'legendary') {
            [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
                const g = audioCtx.createGain(); g.gain.setValueAtTime(0.15, now + i * 0.08); g.gain.linearRampToValueAtTime(0, now + i * 0.08 + 0.25);
                osc.connect(g); g.connect(masterGain); osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.25);
            });
        }
    }

    function buildCardHTML(player, count, isLocked = false) {
        const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
        const rarityClass = `rarity-${player.rarity}`; const lockedClass = isLocked ? ' locked' : '';
        const card = document.createElement('div'); card.className = `player-card ${rarityClass}${lockedClass}`;
        card.setAttribute('data-player-id', player.id);
        if (!isLocked) {
            card.addEventListener('click', (e) => { e.stopPropagation(); openCardModal(player); });
            card.addEventListener('mouseenter', () => { initAudio(); playSound('hover', 0.2); });
        }
        card.innerHTML = `
            <div class="card-rating">${player.rating}</div>
            <div class="card-pos">${player.pos}</div>
            <div class="card-flag">${getFlagEmoji(player.country)}</div>
            <div class="card-player-area"></div>
            <div class="card-name">${player.name}</div>
        `;
        wrapper.appendChild(card);
        if (count > 1) { const badge = document.createElement('div'); badge.className = 'duplicate-badge'; badge.textContent = count; wrapper.appendChild(badge); }
        return wrapper;
    }

    function renderShop() {
        const grid = document.getElementById('packsGrid'); if (!grid) return;
        const packs = [
            { type: 'bronze', name: 'BRONZE', letter: 'B', price: 100 },
            { type: 'silver', name: 'SILVER', letter: 'S', price: 250 },
            { type: 'gold', name: 'GOLD', letter: 'G', price: 500 }
        ];
        grid.innerHTML = packs.map(p => `
            <div class="pack-card ${p.type}" data-pack-type="${p.type}">
                <div class="pack-icon-circle">${p.letter}</div>
                <div class="pack-name">${p.name}</div>
                <div class="pack-price">${p.price.toLocaleString('ru-RU')}</div>
            </div>
        `).join('');
        grid.querySelectorAll('.pack-card').forEach(card => {
            card.addEventListener('click', () => initiatePackOpen(card.getAttribute('data-pack-type')));
            card.addEventListener('mouseenter', () => { initAudio(); playSound('hover', 0.3); });
        });
    }

    let collectionMode = 'mycards';
    function renderCollection() {
        const grid = document.getElementById('collectionGrid'), emptyMsg = document.getElementById('collectionEmpty'), progress = document.getElementById('collectionProgress');
        if (!grid || !emptyMsg || !progress) return;
        const collectedUnique = getUniqueCardCount();
        progress.textContent = `${collectedUnique} / ${allPlayers.length}`;
        grid.innerHTML = '';
        if (collectionMode === 'mycards') {
            const collectedIds = Object.keys(gameState.collection).filter(id => gameState.collection[id] > 0);
            if (collectedIds.length === 0) { emptyMsg.style.display = 'block'; grid.style.display = 'none'; return; }
            emptyMsg.style.display = 'none'; grid.style.display = 'flex';
            const cards = collectedIds.map(id => getPlayerById(id)).filter(Boolean).sort((a,b) => b.rating - a.rating);
            cards.forEach(p => grid.appendChild(buildCardHTML(p, gameState.collection[p.id], false)));
        } else {
            emptyMsg.style.display = 'none'; grid.style.display = 'flex';
            [...allPlayers].sort((a,b) => b.rating - a.rating).forEach(p => {
                const count = gameState.collection[p.id] || 0;
                grid.appendChild(buildCardHTML(p, count, count === 0));
            });
        }
    }
    function setCollectionMode(mode) {
        collectionMode = mode;
        document.getElementById('btnMyCards').classList.toggle('active', mode === 'mycards');
        document.getElementById('btnAlbum').classList.toggle('active', mode === 'album');
        renderCollection();
    }

    let currentModalPlayer = null;
    function openCardModal(player) {
        currentModalPlayer = player; const count = getCardCount(player.id); const price = getSellPrice(player.rating);
        document.getElementById('modalCard').className = 'modal-card rarity-' + player.rarity;
        document.getElementById('modalRating').textContent = player.rating;
        document.getElementById('modalPos').textContent = player.pos;
        document.getElementById('modalFlag').textContent = getFlagEmoji(player.country);
        document.getElementById('modalName').textContent = player.name;
        document.getElementById('modalCount').textContent = count > 0 ? `В коллекции: ${count} шт. | Цена: ${price} монет` : 'Не в коллекции';
        document.getElementById('modalSellBtn').style.display = count > 0 ? 'inline-flex' : 'none';
        document.getElementById('modalSellBtn').textContent = `SELL (${price})`;
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; currentModalPlayer = null; }
    function sellCurrentCard() {
        if (!currentModalPlayer) return; const playerId = currentModalPlayer.id; const count = getCardCount(playerId);
        if (count <= 0) return; const price = getSellPrice(currentModalPlayer.rating);
        gameState.collection[playerId] = count - 1;
        if (gameState.collection[playerId] <= 0) delete gameState.collection[playerId];
        gameState.balance += price; updateUI(); renderCollection(); closeModal();
    }

    let currentPackCards = [];
    function getPackOdds(type) {
        if (type === 'bronze') return { common:0.90, rare:0.09, epic:0.009, legendary:0.0005, tots:0.0005 };
        if (type === 'silver') return { common:0.75, rare:0.213, epic:0.035, legendary:0.001, tots:0.001 };
        return { common:0.60, rare:0.33, epic:0.065, legendary:0.003, tots:0.002 };
    }
    function getPackPrice(type) { return type==='bronze'?100: type==='silver'?250:500; }

    function generateUniquePack(packType) {
        const odds = getPackOdds(packType); const selected = []; const usedIds = new Set();
        for (let i=0; i<5; i++) {
            const roll = Math.random(); let target;
            if (roll < odds.tots) target = 'tots';
            else if (roll < odds.tots + odds.legendary) target = 'legendary';
            else if (roll < odds.tots + odds.legendary + odds.epic) target = 'epic';
            else if (roll < odds.tots + odds.legendary + odds.epic + odds.rare) target = 'rare';
            else target = 'common';
            let pool = allPlayers.filter(p => p.rarity === target && !usedIds.has(p.id));
            if (pool.length === 0) pool = allPlayers.filter(p => !usedIds.has(p.id));
            const pick = pool[Math.floor(Math.random() * pool.length)];
            selected.push(pick); usedIds.add(pick.id);
        }
        selected.sort((a,b) => b.rating - a.rating);
        return selected;
    }

    function initiatePackOpen(packType) {
        initAudio(); const price = getPackPrice(packType);
        if (gameState.balance < price) { alert('Недостаточно монет!'); return; }
        gameState.balance -= price; gameState.packsOpened++; updateUI();
        currentPackCards = generateUniquePack(packType);

        const overlay = document.getElementById('packOpeningOverlay'), packBox = document.getElementById('packBox'),
              hint = document.getElementById('packHint'), revealArea = document.getElementById('packRevealCards'),
              collectBtn = document.getElementById('collectBtn');

        overlay.style.display = 'flex'; revealArea.innerHTML = ''; collectBtn.style.display = 'none';
        hint.textContent = 'ОТКРЫВАЕМ...';
        packBox.className = 'pack-box ' + packType + '-pack';
        packBox.textContent = packType==='bronze'?'B': packType==='silver'?'S':'G';
        packBox.style.display = 'flex'; packBox.classList.add('shaking'); playSound('shake', 0.5);

        const isMobile = window.innerWidth < 768;
        const cardWidth = isMobile ? Math.min(window.innerWidth * 0.25, 110) : 130;
        const gap = isMobile ? 6 : 10;

        setTimeout(() => {
            packBox.classList.remove('shaking'); spawnParticles(packBox); playSound('transform', 0.4);
            packBox.style.display = 'none'; hint.style.display = 'none';

            const positions = [];
            if (isMobile) {
                const totalHeight = currentPackCards.length * (cardWidth * 1.4 + gap) - gap;
                const startY = -totalHeight / 2 + cardWidth * 0.7;
                for (let i = 0; i < currentPackCards.length; i++) positions.push({ x: 0, y: startY + i * (cardWidth * 1.4 + gap) });
            } else {
                const totalWidth = currentPackCards.length * (cardWidth + gap) - gap;
                const startX = -totalWidth / 2 + cardWidth / 2;
                for (let i = 0; i < currentPackCards.length; i++) positions.push({ x: startX + i * (cardWidth + gap), y: 0 });
            }

            revealArea.style.position = 'relative'; revealArea.style.width = '100%';
            revealArea.style.height = isMobile ? `${currentPackCards.length * (cardWidth * 1.4 + gap)}px` : `${cardWidth * 1.4 + 20}px`;

            currentPackCards.forEach((player, idx) => {
                const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
                wrapper.style.position = 'absolute'; wrapper.style.left = '50%'; wrapper.style.top = '50%';
                wrapper.style.transform = 'translate(-50%, -50%) scale(0)'; wrapper.style.opacity = '0';
                wrapper.style.width = cardWidth + 'px'; wrapper.style.height = (cardWidth * 1.4) + 'px';
                wrapper.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s';

                const inner = document.createElement('div'); inner.className = 'card-inner';
                const front = document.createElement('div'); front.className = 'card-front'; front.textContent = 'MD86';
                const back = document.createElement('div'); back.className = 'card-back player-card ' + ('rarity-' + player.rarity);
                back.innerHTML = `
                    <div class="card-rating">${player.rating}</div>
                    <div class="card-pos">${player.pos}</div>
                    <div class="card-flag">${getFlagEmoji(player.country)}</div>
                    <div class="card-player-area"></div>
                    <div class="card-name">${player.name}</div>
                `;
                inner.appendChild(front); inner.appendChild(back); wrapper.appendChild(inner);
                revealArea.appendChild(wrapper); wrapper._player = player;

                if (getCardCount(player.id) > 0) {
                    setTimeout(() => {
                        const dupLabel = document.createElement('div'); dupLabel.className = 'duplicate-label';
                        dupLabel.textContent = 'DUPLICATE'; wrapper.appendChild(dupLabel);
                        requestAnimationFrame(() => dupLabel.classList.add('show'));
                    }, 300);
                }

                const pos = positions[idx];
                setTimeout(() => {
                    wrapper.style.transform = `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px)) scale(1)`;
                    wrapper.style.opacity = '1';
                }, 50);
            });

            setTimeout(() => {
                const wrappers = revealArea.querySelectorAll('.card-wrapper');
                for (let i = wrappers.length - 1; i >= 0; i--) {
                    const delay = (wrappers.length - 1 - i) * 300;
                    setTimeout(() => {
                        const wrapper = wrappers[i]; wrapper.classList.add('flipped'); playSound('flip', 0.4);
                        const player = wrapper._player;
                        if (player.rarity === 'legendary') { spawnLegendaryParticles(wrapper); playSound('legendary', 0.6); }
                        else if (player.rarity === 'epic') spawnEpicParticles(wrapper);
                        else if (player.rarity === 'tots') spawnTotsParticles(wrapper);
                        else if (player.rarity === 'rare') {
                            const back = wrapper.querySelector('.card-back'); back.style.boxShadow = '0 0 30px gold, 0 0 60px gold';
                            setTimeout(() => { back.style.boxShadow = ''; }, 500);
                        }
                    }, delay);
                }
                const totalFlipTime = wrappers.length * 300 + 500;
                setTimeout(() => { collectBtn.style.display = 'inline-flex'; playSound('collectReady', 0.4); }, totalFlipTime);
            }, 600);
        }, 1500);
    }

    function finishPack() {
        currentPackCards.forEach(p => { if (!gameState.collection[p.id]) gameState.collection[p.id] = 0; gameState.collection[p.id]++; });
        updateUI(); renderCollection(); closePackOpening();
    }

    function closePackOpening() {
        document.getElementById('packOpeningOverlay').style.display = 'none';
        document.getElementById('packBox').style.display = 'flex'; document.getElementById('packRevealCards').innerHTML = '';
        document.getElementById('collectBtn').style.display = 'none'; document.getElementById('packHint').style.display = 'block';
        currentPackCards = [];
    }

    function spawnParticles(sourceEl) {
        const count = window.innerWidth < 768 ? 12 : 25;
        const rect = sourceEl.getBoundingClientRect(); const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
        for (let i=0; i<count; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.background = ['#cd7f32','#c0c0c0','#ffd700'][Math.floor(Math.random()*3)];
            p.style.width = '6px'; p.style.height = '6px'; p.style.left = cx + 'px'; p.style.top = cy + 'px';
            p.style.setProperty('--dx', (Math.random()-0.5)*300 + 'px'); p.style.setProperty('--dy', (Math.random()-0.5)*300 + 'px');
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
        }
    }

    function spawnLegendaryParticles(wrapper) { /* аналогично с уменьшенным количеством */ }
    function spawnEpicParticles(wrapper) { /* аналогично */ }
    function spawnTotsParticles(wrapper) { /* аналогично */ }

    document.querySelectorAll('.nav-btn[data-section]').forEach(btn => btn.addEventListener('click', () => switchSection(btn.dataset.section)));
    document.getElementById('btnMyCards').addEventListener('click', () => setCollectionMode('mycards'));
    document.getElementById('btnAlbum').addEventListener('click', () => setCollectionMode('album'));
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalCloseBtn2').addEventListener('click', closeModal);
    document.getElementById('modalSellBtn').addEventListener('click', sellCurrentCard);
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape' && document.getElementById('modalOverlay').style.display==='flex') closeModal(); });
    document.getElementById('collectBtn').addEventListener('click', finishPack);
    document.getElementById('resetBtn').addEventListener('click', () => { if (confirm('Сбросить весь прогресс?')) { localStorage.removeItem(STORAGE_KEY); location.reload(); } });

    function switchSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn[data-section]').forEach(b => b.classList.remove('active'));
        const sec = document.getElementById('section-' + name); if (sec) sec.classList.add('active');
        const btn = document.querySelector(`.nav-btn[data-section="${name}"]`); if (btn) btn.classList.add('active');
        if (name === 'collection') renderCollection(); else if (name === 'shop') renderShop();
    }

    loadState(); updateUI(); renderShop(); renderCollection(); setCollectionMode('mycards'); switchSection('shop');
});
</script>
</body>
</html>
